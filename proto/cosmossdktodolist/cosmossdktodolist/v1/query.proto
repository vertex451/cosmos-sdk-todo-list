syntax = "proto3";

package cosmossdktodolist.cosmossdktodolist.v1;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmossdktodolist/cosmossdktodolist/v1/params.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";

option go_package = "cosmos-sdk-todo-list/x/cosmossdktodolist/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/cosmos-sdk-todo-list/cosmossdktodolist/v1/params";
  }

  // ListTodos Queries a list of ListTodos items.
  rpc ListTodos(QueryListTodosRequest) returns (QueryListTodosResponse) {
    option (google.api.http).get = "/cosmos-sdk-todo-list/cosmossdktodolist/v1/list_todos";
  }

  // GetTodo Queries a list of GetTodo items.
  rpc GetTodo(QueryGetTodoRequest) returns (QueryGetTodoResponse) {
    option (google.api.http).get = "/cosmos-sdk-todo-list/cosmossdktodolist/v1/get_todo/{id}";
  }

  // GetTodosByStatus Queries a list of GetTodosByStatus items.
  rpc GetTodosByStatus(QueryGetTodosByStatusRequest) returns (QueryGetTodosByStatusResponse) {
    option (google.api.http).get = "/cosmos-sdk-todo-list/cosmossdktodolist/v1/get_todos_by_status/{completed}";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// QueryListTodosRequest defines the QueryListTodosRequest message.
message QueryListTodosRequest {}

// QueryListTodosResponse defines the QueryListTodosResponse message.
message QueryListTodosResponse {}

// QueryGetTodoRequest defines the QueryGetTodoRequest message.
message QueryGetTodoRequest {
  uint64 id = 1;
}

// QueryGetTodoResponse defines the QueryGetTodoResponse message.
message QueryGetTodoResponse {}

// QueryGetTodosByStatusRequest defines the QueryGetTodosByStatusRequest message.
message QueryGetTodosByStatusRequest {
  bool completed = 1;
}

// QueryGetTodosByStatusResponse defines the QueryGetTodosByStatusResponse message.
message QueryGetTodosByStatusResponse {}
